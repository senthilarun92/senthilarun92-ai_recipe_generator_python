<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Recipe Generator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* =========================
HEADER
========================= */

header{
    padding:30px;
    text-align:center;
    background:linear-gradient(to right,#1a120b,#2d1b0f);
    border-bottom:1px solid #3d2a1d;
}

header h1{
    font-size:55px;
    color:#ffcc8a;
}

header p{
    margin-top:10px;
    color:#c7b299;
}

/* =========================
CONTAINER
========================= */

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:30px 0;
}

/* =========================
TOP PANEL
========================= */

.top-panel{
    background:#151515;
    border:1px solid #2c2c2c;
    border-radius:20px;
    padding:25px;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

label{
    display:block;
    margin-bottom:10px;
    color:#ffcc8a;
    font-weight:bold;
}

textarea,
select{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #444;
    background:#101010;
    color:white;
    font-size:16px;
}

textarea{
    height:120px;
    resize:none;
}

/* =========================
BUTTONS
========================= */

.button-row{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(to right,#d97706,#f59e0b);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    opacity:0.9;
}

.secondary-btn{
    background:#2a2a2a;
}

/* =========================
RECIPES
========================= */

.recipes{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
}

.recipe-card{
    background:#151515;
    border:1px solid #2d2d2d;
    border-radius:20px;
    padding:25px;
    transition:0.3s;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.recipe-card:hover{
    transform:translateY(-5px);
    border-color:#f59e0b;
}

.recipe-card h3{
    color:#ffcc8a;
    margin-bottom:10px;
    font-size:22px;
}

.recipe-card p{
    color:#ccc;
    line-height:1.5;
}

/* =========================
FULL RECIPE
========================= */

.recipe-container{
    margin-top:40px;
    background:#151515;
    border-radius:25px;
    border:1px solid #2f2f2f;
    padding:35px;
    display:none;
}

.recipe-header{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:20px;
}

.recipe-title{
    font-size:42px;
    color:#ffcc8a;
}

.recipe-description{
    margin-top:10px;
    color:#ccc;
    line-height:1.7;
}

/* =========================
INFO BOXES
========================= */

.info-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    margin-top:25px;
}

.info-box{
    background:#101010;
    padding:20px;
    border-radius:15px;
    text-align:center;
    border:1px solid #333;
}

.info-box h4{
    color:#ffcc8a;
    margin-bottom:10px;
}

/* =========================
NUTRITION
========================= */

.nutrition-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:25px;
}

.nutrition-card{
    background:#101010;
    border:1px solid #333;
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.nutrition-card h3{
    color:#f59e0b;
    font-size:28px;
}

.nutrition-card p{
    margin-top:10px;
    color:#ccc;
}

/* =========================
SECTIONS
========================= */

.section{
    margin-top:40px;
}

.section h2{
    color:#ffcc8a;
    margin-bottom:20px;
    font-size:28px;
}

.ingredients-list,
.instructions-list{
    padding-left:25px;
}

.ingredients-list li,
.instructions-list li{
    margin-bottom:15px;
    line-height:1.6;
    color:#ddd;
}

/* =========================
SIMILAR RECIPES
========================= */

.similar-grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.similar-item{
    background:#1f1f1f;
    border:1px solid #333;
    padding:12px 18px;
    border-radius:12px;
    color:#ffcc8a;
}

/* =========================
LOADER
========================= */

.loader{
    text-align:center;
    margin-top:30px;
    display:none;
}

.loader h2{
    color:#ffcc8a;
}

/* =========================
ERROR
========================= */

.error{
    background:#2a1010;
    color:#ff6b6b;
    padding:18px;
    border-radius:12px;
    margin-top:20px;
    display:none;
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:768px){

    header h1{
        font-size:40px;
    }

    .recipe-title{
        font-size:30px;
    }

}

</style>
</head>

<body>

<header>
    <h1>🍳 AI Recipe Generator</h1>
    <p>Create delicious recipes instantly using AI</p>
</header>

<div class="container">

    <div class="top-panel">

        <div class="grid">

            <div>
                <label>Ingredients</label>

                <textarea
                    id="ingredients"
                    placeholder="Example: rice, curd, onion"
                ></textarea>
            </div>

            <div>
                <label>Cuisine</label>

                <select id="cuisine">
                    <option>Any</option>
                    <option>Indian</option>
                    <option>Chinese</option>
                    <option>Italian</option>
                    <option>Mexican</option>
                </select>
            </div>

            <div>
                <label>Diet</label>

                <select id="diet">
                    <option>Any</option>
                    <option>Vegetarian</option>
                    <option>Vegan</option>
                    <option>High Protein</option>
                    <option>Keto</option>
                </select>
            </div>

            <div>
                <label>Language</label>

                <select id="language">
                    <option>English</option>
                    <option>Tamil</option>
                    <option>Hindi</option>
                    <option>French</option>
                </select>
            </div>

        </div>

        <div class="button-row">

            <button onclick="generateRecipes()">
                Generate Recipes
            </button>

            <button class="secondary-btn"
                onclick="startVoiceInput()">
                🎤 Voice Input
            </button>

            <button class="secondary-btn"
                onclick="toggleTheme()">
                🌙 Theme
            </button>

        </div>

        <div class="error" id="errorBox"></div>

    </div>

    <div class="loader" id="loader">
        <h2>Generating recipes...</h2>
    </div>

    <div class="recipes"
        id="recipesContainer"></div>

    <div class="recipe-container"
        id="recipeContainer"></div>

</div>

<script>

async function generateRecipes() {

    const ingredients =
        document.getElementById("ingredients").value.trim();

    const cuisine =
        document.getElementById("cuisine").value;

    const diet =
        document.getElementById("diet").value;

    const language =
        document.getElementById("language").value;

    const recipesContainer =
        document.getElementById("recipesContainer");

    const recipeContainer =
        document.getElementById("recipeContainer");

    const loader =
        document.getElementById("loader");

    const errorBox =
        document.getElementById("errorBox");

    recipesContainer.innerHTML = "";
    recipeContainer.style.display = "none";
    errorBox.style.display = "none";

    if (!ingredients) {

        errorBox.style.display = "block";
        errorBox.innerText = "Please enter ingredients";

        return;
    }

    loader.style.display = "block";

    try {

        const response =
            await fetch("/suggest_dishes", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                ingredients,
                cuisine,
                diet,
                language
            })
        });

        const data = await response.json();

        loader.style.display = "none";

        console.log(data);

        if (data.error) {

            errorBox.style.display = "block";
            errorBox.innerText = data.error;

            return;
        }

        if (!data.recipes ||
            data.recipes.length === 0) {

            errorBox.style.display = "block";
            errorBox.innerText =
                "No recipes found";

            return;
        }

        let html = "";

        data.recipes.forEach(recipe => {

            html += `

            <div class="recipe-card"
                onclick="generateFullRecipe('${recipe.name}')">

                <h3>${recipe.name}</h3>

                <p>${recipe.description}</p>

            </div>

            `;
        });

        recipesContainer.innerHTML = html;

    }

    catch (error) {

        loader.style.display = "none";

        console.error(error);

        errorBox.style.display = "block";
        errorBox.innerText = error.message;
    }
}



async function generateFullRecipe(dishName) {

    const recipeContainer =
        document.getElementById("recipeContainer");

    const loader =
        document.getElementById("loader");

    loader.style.display = "block";

    try {

        const language =
            document.getElementById("language").value;

        const response =
            await fetch("/generate_recipe", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                dish_name: dishName,
                language: language
            })
        });

        const data = await response.json();

        loader.style.display = "none";

        console.log(data);

        if (data.error) {

            alert(data.error);
            return;
        }

        const r = data.recipe;

        recipeContainer.style.display = "block";

        recipeContainer.innerHTML = `

        <div class="recipe-header">

            <div>

                <h1 class="recipe-title">
                    ${r.title}
                </h1>

                <p class="recipe-description">
                    ${r.description}
                </p>

            </div>

        </div>

        <div class="info-grid">

            <div class="info-box">
                <h4>Servings</h4>
                <p>${r.servings}</p>
            </div>

            <div class="info-box">
                <h4>Prep Time</h4>
                <p>${r.prep_time}</p>
            </div>

            <div class="info-box">
                <h4>Cook Time</h4>
                <p>${r.cook_time}</p>
            </div>

            <div class="info-box">
                <h4>Difficulty</h4>
                <p>${r.difficulty}</p>
            </div>

        </div>

        <div class="section">

            <h2>Nutrition</h2>

            <div class="nutrition-grid">

                <div class="nutrition-card">
                    <h3>${r.nutrition.calories}</h3>
                    <p>Calories</p>
                </div>

                <div class="nutrition-card">
                    <h3>${r.nutrition.protein}</h3>
                    <p>Protein</p>
                </div>

                <div class="nutrition-card">
                    <h3>${r.nutrition.carbs}</h3>
                    <p>Carbs</p>
                </div>

                <div class="nutrition-card">
                    <h3>${r.nutrition.fat}</h3>
                    <p>Fat</p>
                </div>

            </div>

        </div>

        <div class="section">

            <h2>Ingredients</h2>

            <ul class="ingredients-list">

                ${r.ingredients.map(i =>
                    `<li>${i}</li>`
                ).join("")}

            </ul>

        </div>

        <div class="section">

            <h2>Instructions</h2>

            <ol class="instructions-list">

                ${r.instructions.map(i =>
                    `<li>${i}</li>`
                ).join("")}

            </ol>

        </div>

        <div class="section">

            <h2>Chef Tips</h2>

            <p>${r.tips}</p>

        </div>

        <div class="section">

            <h2>Similar Recipes</h2>

            <div class="similar-grid">

                ${r.similar.map(i =>
                    `<div class="similar-item">${i}</div>`
                ).join("")}

            </div>

        </div>

        `;
    }

    catch (error) {

        loader.style.display = "none";

        console.error(error);

        alert(error.message);
    }
}



function startVoiceInput() {

    if (!('webkitSpeechRecognition'
        in window)) {

        alert("Voice recognition not supported");
        return;
    }

    const recognition =
        new webkitSpeechRecognition();

    recognition.lang = "en-IN";

    recognition.onresult =
        function(event) {

        document.getElementById(
            "ingredients").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}



function toggleTheme() {

    document.body.classList
        .toggle("light-mode");
}

</script>

</body>
</html>
